<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://yonge6.github.io/Design/english-quote-log/">
  <title>AI驱动英语听说</title>
  <style>
    :root {
      --paper: #f7f1e6;
      --ink: #151515;
      --muted: #6b6257;
      --yellow: #efc35a;
      --green: #2f6d55;
      --radius: 8px;
      --sans: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: var(--sans);
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(21,21,21,0.045) 1px, transparent 1px),
        linear-gradient(rgba(21,21,21,0.04) 1px, transparent 1px),
        var(--paper);
      background-size: 26px 26px;
    }

    main {
      width: min(620px, 100%);
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: rgba(255, 250, 240, 0.94);
      box-shadow: 6px 6px 0 var(--ink);
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(30px, 7vw, 46px);
      line-height: 1.06;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    a {
      margin-top: 18px;
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--yellow);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      padding: 0 18px;
      text-decoration: none;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <h1>AI驱动英语听说</h1>
    <p>正在打开新版英语学习页面。</p>
    <a href="https://yonge6.github.io/Design/english-quote-log/">立即打开</a>
  </main>
  <script>
    window.location.replace("https://yonge6.github.io/Design/english-quote-log/");
  </script>
</body>
</html>
