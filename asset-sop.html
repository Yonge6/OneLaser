function Bilingual({ cn, en, mode, className = "" }) {

    <span className={className}>

  );
}

              <p className="mt-4 max-w-xl text-base leading-7 text-slate-300">
                <Bilingual
                  cn="从需求提交到复盘归档，每一步都必须留下版本、负责人和审核记录。"
                  en="From request to archive, every step must leave a clear version, owner, and approval record."
                  mode={mode}
                />
              </p>
            </div>
            <div className="grid gap-3 md:grid-cols-4">
              {workflow.map(([cn, en], index) => (
                <div key={cn} className="relative rounded-2xl border border-white/10 bg-white/5 p-4">
                  <div className="mb-4 flex items-center justify-between">
                    <span className="text-2xl font-black text-red-400">{String(index + 1).padStart(2, "0")}</span>
                    <Workflow size={18} className="text-slate-500" />
                  </div>
                  <div className="text-sm font-bold"><Bilingual cn={cn} en={en} mode={mode} /></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      <section className="relative mx-auto max-w-7xl px-6 py-16 md:px-10">
        <SectionTitle
          mode={mode}
          eyebrow="05 / Asset Types"
          titleCn="资产类型与归档范围"
          titleEn="Asset Types & Filing Scope"
          descCn="不同类型资产进入对应产品线内部模块，避免散落在个人电脑、聊天记录或临时链接中。"
          descEn="Different asset types are stored inside the right product-line module instead of personal drives, chats, or temporary links."
        />
        <div className="grid gap-5 md:grid-cols-3">
          {assetTypes.map((group) => (
            <div key={group.en} className="rounded-[1.6rem] border border-slate-200 bg-white p-6 shadow-sm">
              <div className="mb-5 flex items-center gap-3">
                <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-950 text-white"><Package size={20} /></div>
                <h3 className="text-xl font-black"><Bilingual cn={group.cn} en={group.en} mode={mode} /></h3>
              </div>
              <div className="flex flex-wrap gap-2">
                {group.items.map((item) => (
                  <span key={item} className="rounded-full bg-slate-100 px-3 py-2 text-xs font-bold text-slate-700">{item}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      </section>

      <section className="relative bg-white py-16">
        <div className="mx-auto grid max-w-7xl gap-8 px-6 md:grid-cols-2 md:px-10">
          <div className="rounded-[2rem] border border-slate-200 bg-[#f7f7f5] p-7">
            <div className="mb-3 inline-flex rounded-full bg-red-50 px-3 py-1 text-xs font-black uppercase tracking-[0.2em] text-red-600">06 / Naming</div>
            <h2 className="text-3xl font-black"><Bilingual cn="文件命名规范" en="File Naming Rules" mode={mode} /></h2>
            <p className="mt-3 text-sm leading-6 text-slate-600">
              <Bilingual cn="所有文件必须包含品牌、产品线、资产类型、渠道、语言、时间和版本。" en="Every file must include brand, product line, asset type, channel, language, time, and version." mode={mode} />
            </p>
            <div className="mt-6 rounded-2xl bg-slate-950 p-5 font-mono text-xs leading-6 text-slate-100">
              ONELASER_[ProductLine]_[ProductModel]_[AssetType]_[Channel]_[Language]_[YYYYQ#]_[Version]
            </div>
            <div className="mt-5 space-y-3">
              {namingExamples.map((name) => (
                <div key={name} className="rounded-2xl border border-slate-200 bg-white p-4 font-mono text-xs text-slate-700">{name}</div>
              ))}
            </div>
          </div>

          <div className="rounded-[2rem] border border-slate-200 bg-slate-950 p-7 text-white">
            <div className="mb-3 inline-flex rounded-full bg-white/10 px-3 py-1 text-xs font-black uppercase tracking-[0.2em] text-red-300">07 / Rules</div>
            <h2 className="text-3xl font-black"><Bilingual cn="关键执行规则" en="Key Execution Rules" mode={mode} /></h2>
            <div className="mt-6 space-y-3">
              {rules.map((rule) => (
                <div key={rule.en} className="flex gap-3 rounded-2xl border border-white/10 bg-white/5 p-4">
                  <CheckCircle2 className="mt-0.5 shrink-0 text-red-400" size={20} />
                  <p className="text-sm leading-6 text-slate-200"><Bilingual cn={rule.cn} en={rule.en} mode={mode} /></p>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      <section className="relative mx-auto max-w-7xl px-6 py-16 md:px-10">
        <SectionTitle
          mode={mode}
          eyebrow="08 / Rollout"
          titleCn="30 天落地计划"
          titleEn="30-Day Rollout Plan"
          descCn="用 4 周完成从目录搭建、资产整理、索引补齐到第一轮审计。"
          descEn="Complete folder setup, asset organization, index completion, and the first audit in four weeks."
        />
        <div className="grid gap-5 md:grid-cols-4">
          {rollout.map((item) => (
            <div key={item.week} className="rounded-[1.6rem] border border-slate-200 bg-white p-6 shadow-sm">
              <div className="mb-5 flex items-center justify-between">
                <span className="text-4xl font-black text-red-600">{item.week}</span>
                <FileCheck2 className="text-slate-300" size={28} />
              </div>
              <h3 className="text-xl font-black"><Bilingual cn={item.cn} en={item.en} mode={mode} /></h3>
              <p className="mt-3 text-sm leading-6 text-slate-600"><Bilingual cn={item.bodyCn} en={item.bodyEn} mode={mode} /></p>
            </div>
          ))}
        </div>
      </section>

      <footer className="relative border-t border-slate-200 bg-white">
        <div className="mx-auto flex max-w-7xl flex-col gap-5 px-6 py-10 md:flex-row md:items-center md:justify-between md:px-10">
          <div>
            <div className="text-2xl font-black tracking-tight">ONELASER</div>
            <div className="mt-1 text-sm font-semibold text-slate-500">Make Better With One</div>
          </div>
          <div className="max-w-2xl text-sm leading-6 text-slate-600 md:text-right">
            <Bilingual
              cn="一句话原则：ONELASER 资产管理不是按部门找文件，而是按产品线管理资产。"
              en="One-line rule: ONELASER assets are managed by product line, not by department."
              mode={mode}
            />
          </div>
        </div>
      </footer>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OnelaserAssetSOPWeb />);
  </script>
